<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 6 🕯️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:Arial,sans-serif;
color:white;
}

.card{
width:90%;
max-width:500px;
padding:35px;
background:#111827;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px #3b82f6;
animation:fade 1s;
}

h1{
font-size:55px;
margin-bottom:15px;
}

p{
font-size:24px;
line-height:1.8;
}

button{
margin-top:25px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:35px;
background:#2563eb;
color:white;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<div class="card">

<h1>🕯️🎂</h1>

<p>
Ab candles blow karo... 🌬️<br><br>

Aur ek wish bhi maang lena... 💙✨
</p>

<button onclick="location.href='page7.html'">
Blow 🎂
</button>

</div>

</body>
</html>
