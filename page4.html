<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 4 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:Arial,sans-serif;
overflow:hidden;
color:white;
}

.card{
width:90%;
max-width:500px;
padding:35px;
text-align:center;
background:#111827;
border-radius:25px;
box-shadow:0 0 35px #3b82f6;
animation:pop 1s;
}

h1{
font-size:40px;
color:#60a5fa;
margin-bottom:20px;
}

p{
font-size:24px;
line-height:1.8;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:35px;
background:#2563eb;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

@keyframes pop{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="card">

<h1>🎉 Surprise!! 🎉</h1>

<p>
Ab aankhen khol lo... 👀<br><br>

Aur smile karna mat bhoolna 😊💙
</p>

<button onclick="location.href='page5.html'">
Wow! ✨
</button>

</div>

</body>
</html>
