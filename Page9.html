<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 9 🎁</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

.card{
width:90%;
max-width:500px;
padding:35px;
text-align:center;
background:#111827;
border-radius:25px;
box-shadow:0 0 30px #3b82f6;
animation:fade 1.2s;
}

h1{
font-size:55px;
margin-bottom:20px;
color:#60a5fa;
}

p{
font-size:23px;
line-height:1.8;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:35px;
background:#2563eb;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#3b82f6;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="card">
