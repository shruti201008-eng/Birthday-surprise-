<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

.card{
width:92%;
max-width:600px;
padding:40px;
background:#111827;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px #3b82f6;
animation:zoom 1.5s;
}

h1{
font-size:45px;
color:#60a5fa;
margin-bottom:20px;
}

p{
font-size:22px;
line-height:1.9;
}

.end{
margin-top:25px;
font-size:18px;
opacity:.8;
}

@keyframes zoom{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday Buddhu 💙</h1>

<p>

May this new year of your life bring you...

✨ Endless happiness

🌸 Beautiful memories

💪 Good health

😊 Lots of smiles

🎯 Success in everything you do.

<br><br>

Enjoy your special day! 🥳

</p>

<div class="end">

Made with 💙 especially for you.

</div>

</div>

</body>
</html>
