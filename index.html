<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 💙</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
width:90%;
max-width:600px;
background:#071327;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 35px #3b82f6;
animation:fade 1.5s;
}

h1{
font-size:42px;
color:#60a5fa;
margin-bottom:15px;
}

p{
font-size:22px;
color:white;
line-height:1.8;
}

button{
margin-top:35px;
padding:16px 45px;
font-size:22px;
border:none;
border-radius:40px;
background:#2563eb;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#3b82f6;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<h1>Happy Birthday Buddhu 💙</h1>

<p>
Welcome...✨
<br><br>

Aaj tumhare liye ek chhoti si journey ready hai.
<br><br>

Har page par ek surprise milega...
</p>

<button onclick="location.href='page2.html'">
Start 💙
</button>

</div>

</body>
</html>
