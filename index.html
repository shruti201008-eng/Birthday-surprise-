<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Budhhu 💙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
overflow:hidden;
font-family:Arial,sans-serif;
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#4fc3ff 1px,transparent 1px);
background-size:40px 40px;
animation:move 20s linear infinite;
opacity:.6;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

.card{
position:relative;
z-index:2;
text-align:center;
background:rgba(0,0,0,.45);
padding:35px;
border-radius:20px;
backdrop-filter:blur(8px);
box-shadow:0 0 25px #2196f3;
}

h1{
font-size:42px;
color:#64b5ff;
margin-bottom:10px;
}

p{
font-size:20px;
margin-top:10px;
}

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#1976d2;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<h1>Happy Birthday Budhhu 💙</h1>

<p>Tap below to begin your surprise...</p>

<button>Start ✨</button>

</div>

</body>
</html>
