

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 3 💙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

.card{
width:90%;
max-width:500px;
padding:35px;
text-align:center;
background:#111827;
border-radius:25px;
box-shadow:0 0 30px #3b82f6;
animation:fade 1.5s;
}

h1{
font-size:36px;
color:#60a5fa;
margin-bottom:20px;
}

p{
font-size:24px;
line-height:1.9;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:35px;
background:#2563eb;
color:white;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<p>
