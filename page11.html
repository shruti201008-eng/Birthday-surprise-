<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 11 💌</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

.card{
width:90%;
max-width:520px;
padding:35px;
background:#111827;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px #3b82f6;
animation:fade 1.2s;
}

h1{
font-size:45px;
color:#60a5fa;
margin-bottom:20px;
}

p{
font-size:22px;
line-height:1.9;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:35px;
background:#2563eb;
color:white;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="card">

<h1>💌 A Small Wish</h1>

<p>

I just hope...

<br><br>

You always have a reason to smile. 😊

<br><br>

May this year bring you happiness,
good health, and lots of beautiful memories. 💙

</p>

<button onclick="location.href='page12.html'">

Next ➜

</button>

</div>

</body>
</html>
